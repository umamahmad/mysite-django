<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Results</title>

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f8f8f8;
    margin: 0;
    padding: 30px;
    color: #333;
}

h1 {
    text-align: center;
    color: #444;
    margin-bottom: 30px;
}

table {
    width: 100%;
    max-width: 800px;
    margin: 0 auto 40px auto;
    border-collapse: collapse;
    background-color: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

th, td {
    padding: 12px 15px;
    text-align: left;
    border: 1px solid #ddd;
}

th {
    background-color: #4a4a4a;
    color: white;
    font-weight: bold;
}

tr:nth-child(even) {
    background-color: #f9f9f9;
}

.marks {
    text-align: center;
    font-weight: bold;
}

.good {
    color: #006600;
}

.average {
    color: #cc7700;
}

.poor {
    color: #990000;
}

.center-text {
    text-align: center;
    color: #777;
    font-size: 0.95em;
    margin-top: 30px;
}
</style>
</head>

<body>

<h1>Student Results</h1>

<table>
<thead>
<tr>
    <th>Student</th>
    <th>Subject</th>
    <th class="marks">Marks</th>
</tr>
</thead>

<tbody>

{% for result in results %}
<tr>
    <td>{{ result.student }}</td>
    <td>{{ result.subject }}</td>

    <td class="marks {% if result.marks >= 85 %}good{% elif result.marks >= 70 %}average{% else %}poor{% endif %}">
        {{ result.marks }}
    </td>
</tr>

{% empty %}
<tr>
    <td colspan="3" style="text-align:center; color:#888; padding:20px;">
        No results available
    </td>
</tr>
{% endfor %}

</tbody>
</table>

<div class="center-text">
    Simple table view • Generated on {{ today|default:"today" }}
</div>

</body>
</html>
